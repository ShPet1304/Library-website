<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <header>
      <h1 class="header-name">Library</h1>
    </header>
    <button class="form-button" onclick="openForm()">Add Book</button>
    <div class="add-book-form" id="bookForm">
      <h2 class="form-heading">Add Book</h2>
      <form class="form-container">
        <label for="title"></label>
        <input
          type="text"
          id="title"
          placeholder="Enter Title"
          name="title"
          required
        />

        <label for="author"></label>
        <input
          type="text"
          id="author"
          placeholder="Enter Author's name"
          name="author"
          required
        />

        <label for="pages" class="form-page-number"></label>
        <input
          type="number"
          id="pages"
          placeholder="Enter Number Of Pages"
          min="1"
          name="pages"
          required
        />
        <label for="read" class="form-read"> </label><br />
        <input type="checkbox" id="read" name="read" />

        <button type="submit" class="btn">Add</button>
        <button type="button" class="btn cancel" onclick="closeForm()">
          Close
        </button>
      </form>
    </div>
    <div class="card-container"></div>
    <footer></footer>
  </body>
</html>
